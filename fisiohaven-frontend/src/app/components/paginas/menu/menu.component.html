<div class="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-800">
  
  <!-- Navbar Superior -->
  <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 sticky top-0 z-20 shadow-sm shrink-0">
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2">
        <div class="bg-blue-900 text-white p-1.5 rounded-lg font-bold">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <span class="font-extrabold text-xl tracking-tight text-slate-900">PhysioPoint</span>
      </div>

      <nav class="flex gap-2">
        <button (click)="currentView.set('catalog')" 
                class="px-4 py-2 text-sm font-semibold rounded-lg transition-colors"
                [class.bg-blue-900]="currentView() === 'catalog'"
                [class.text-white]="currentView() === 'catalog'"
                [class.text-gray-500]="currentView() !== 'catalog'"
                [class.hover:bg-gray-100]="currentView() !== 'catalog'">
          Catálogo
        </button>
        <button (click)="currentView.set('history')" 
                class="px-4 py-2 text-sm font-semibold rounded-lg transition-colors"
                [class.bg-blue-900]="currentView() === 'history'"
                [class.text-white]="currentView() === 'history'"
                [class.text-gray-500]="currentView() !== 'history'"
                [class.hover:bg-gray-100]="currentView() !== 'history'">
          Historial de Ventas
        </button>
      </nav>
    </div>

    <div class="flex items-center gap-4">
      <div class="relative">
        <svg class="w-5 h-5 absolute left-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" [(ngModel)]="searchTerm" placeholder="Buscar productos, facturas..." class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 w-72">
      </div>
      
      <button (click)="cartOpen.set(true)" class="relative p-2.5 bg-blue-900 text-white rounded-xl hover:bg-blue-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        <span *ngIf="cartService.itemCount() > 0" class="absolute -top-1 -right-1 bg-teal-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full border-2 border-white">
          {{ cartService.itemCount() }}
        </span>
      </button>

      <button (click)="logout()" class="p-2.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors ml-2" title="Cerrar sesión">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
      </button>
    </div>
  </header>

  <!-- Contenido Dinámico -->
  <main class="flex-1 flex overflow-hidden">
    @if (currentView() === 'catalog') {
      <app-catalog-view [searchTerm]="searchTerm()" class="flex-1 flex"></app-catalog-view>
    } @else {
      <app-history-view [searchTerm]="searchTerm()" class="flex-1 flex"></app-history-view>
    }
  </main>

  <!-- Carrito Drawer -->
  <app-cart-drawer *ngIf="cartOpen()" (close)="cartOpen.set(false)"></app-cart-drawer>
</div>
