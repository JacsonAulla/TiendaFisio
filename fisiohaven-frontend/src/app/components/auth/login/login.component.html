<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-900 px-4">
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-900/90 to-slate-900/95"></div>
    </div>

    <div class="relative z-10 w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <!-- Logo o Título -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-blue-900 tracking-tight">Login</h2>
            <p class="text-gray-500 mt-2">Accede a tu panel de control Fisiohaven</p>
        </div>

        <!-- Mensaje de Error (Vinculado a tu lógica TS) -->
        @if (errorMessage) {
        <div class="mb-4 p-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg animate-pulse">
            {{ errorMessage }}
        </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Usuario</label>
                <input id="username" type="text" formControlName="username"
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2.5 border"
                    placeholder="nombre.usuario">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input id="password" type="password" formControlName="password"
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2.5 border"
                    placeholder="••••••••">
            </div>

            <button type="submit" [disabled]="loginForm.invalid || isSubmitting"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-gray-400 transition-all">
                {{ isSubmitting ? 'Entrando...' : 'Entrar' }}
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            ¿No tienes cuenta?
            <a routerLink="/registro" class="text-blue-600 hover:text-blue-800 font-semibold underline">Regístrate
                aquí</a>
        </div>
    </div>
</div>
