<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-blue-900 tracking-tight">Crear Cuenta</h2>
            <p class="text-gray-500 mt-2">Únete a la comunidad Fisiohaven</p>
        </div>

        @if (errorMessage) {
        <div class="mb-4 p-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg">
            {{ errorMessage }}
        </div>
        }

        <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Nuevo Usuario</label>
                <input id="username" type="text" formControlName="username"
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2.5 border"
                    placeholder="Elige un usuario">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input id="password" type="password" formControlName="password"
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2.5 border"
                    placeholder="Crea una contraseña segura">
            </div>

            <button type="submit" [disabled]="registroForm.invalid || isSubmitting"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 disabled:bg-gray-400 transition-all">
                {{ isSubmitting ? 'Registrando...' : 'Registrarse' }}
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            ¿Ya tienes cuenta?
            <a routerLink="/login" class="text-teal-600 hover:text-teal-800 font-semibold underline">Inicia sesión</a>
        </div>
    </div>
</div>
